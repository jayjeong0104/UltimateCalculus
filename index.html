<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Calculus BC Challenge</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div id="game-container">
        <h1>AP Calculus BC Challenge</h1>
        <div id="problem" class="problem">$$ \frac{d}{dx} x^2 $$</div>
        <input type="text" id="answer-input" placeholder="Enter your answer (e.g., 2x)">
        <button id="submit-btn">Submit Answer</button>
        <div id="time-bar-container">
            <div id="time-bar"></div>
        </div>
        <div id="score-display">Score: 0</div>
        <div id="level-display">Level: 1</div>
        <canvas id="vfx-canvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
